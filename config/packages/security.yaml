security:
    password_hashers:
        App\Entity\Employe: 'auto'

    providers:
        app_employe_provider:
            entity:
                class: App\Entity\Employe
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_employe_provider
            form_login:
                login_path: app_dispatch
                check_path: app_login
                default_target_path: /projets
            logout:
                path: app_logout
                target: app_dispatch

    access_control:
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\Employe:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
